<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flow Canvas v2</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.css">
  <style>
    :root{--bg:#1b2621;--bg2:#222f28;--panel:#1f2b25;--line:#3c4f44;--text:#e3eee8;--muted:#a9b9b0;--btn:#2e4338;--btn2:#3b5548}
    html,body,#root{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:system-ui}
    .page{height:100%;display:grid;grid-template-rows:48px 1fr}
    .toolbar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line);background:var(--bg2)}
    .toolbar .sp{flex:1}
    .layout{display:grid;grid-template-columns:1fr 320px;height:100%;position:relative}
    .leftbar{position:absolute;left:0;top:0;bottom:0;width:320px;border-right:1px solid var(--line);background:var(--panel);padding:12px;overflow:auto;z-index:30}
    .sidebar{position:relative;border-left:1px solid var(--line);background:var(--panel);padding:12px;overflow:auto}
    .resizer{position:absolute;left:-4px;top:0;bottom:0;width:8px;cursor:col-resize;background:transparent}
    .resizer:hover{background:#ffffff22}
    .node{background:#24332b;border:1px solid #4f6658;border-radius:8px;min-width:230px;box-shadow:0 2px 10px rgba(0,0,0,.25)}
    .head{padding:8px 10px;font-weight:600;border-bottom:1px solid #3a4e43}.body{padding:8px 10px;font-size:12px;color:#c1d1c8}
    .prompt{border-color:#8b6b2f}.image{border-color:#5e5588}.workflow{border-color:#4f7a5c}.generate{border-color:#3f678a}
    .react-flow__node.selected .node{outline:1px solid #ffffff44}
    .react-flow__handle{width:10px;height:10px}.h-text{background:#ffcc80}.h-image{background:#b39ddb}.h-workflow{background:#81d4fa}
    .btn{background:var(--btn);color:var(--text);border:1px solid #557060;padding:6px 10px;border-radius:6px;cursor:pointer}
    .btn:hover{background:var(--btn2)}
    input,select,textarea{width:100%;background:#17211c;color:var(--text);border:1px solid #42594d;padding:6px;border-radius:6px}
    .log{font-family:ui-monospace,monospace;font-size:11px;white-space:pre-wrap;color:#b9cec2;max-height:220px;overflow:auto;background:#162019;border:1px solid var(--line);padding:8px;border-radius:6px}
    .muted{color:var(--muted);font-size:12px}
    .menu{position:fixed;z-index:40;background:#1d2a23;border:1px solid #4a6456;border-radius:8px;padding:8px;min-width:190px;box-shadow:0 8px 20px rgba(0,0,0,.35)}
    .menu button{display:block;width:100%;text-align:left;margin:3px 0;background:#2a3b32;border:1px solid #4a6456;color:var(--text);padding:6px 8px;border-radius:6px;cursor:pointer}
    .menu button:hover{background:#355046}
    .hidden{display:none}
    .floating-log{position:fixed;right:12px;bottom:12px;width:380px;max-height:280px;background:#18231d;border:1px solid #476256;border-radius:8px;padding:8px;z-index:45}
    .tabs{display:flex;gap:6px;margin-bottom:8px}.tab{padding:6px 8px;border:1px solid #4a6456;border-radius:6px;cursor:pointer;background:#24352d}.tab.active{background:#355046}
  </style>
  <script type="importmap">
  {"imports":{"react":"https://esm.sh/react@18.3.1","react/":"https://esm.sh/react@18.3.1/","react-dom":"https://esm.sh/react-dom@18.3.1","react-dom/":"https://esm.sh/react-dom@18.3.1/","reactflow":"https://esm.sh/reactflow@11.11.4?external=react,react-dom","htm":"https://esm.sh/htm@3.1.1"}}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./flow-canvas-v2.js?v=3"></script>
</body>
</html>
