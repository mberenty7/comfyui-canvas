<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComfyUI Canvas</title>
  <link rel="stylesheet" href="style.css?v=6">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
  <div id="toolbar">
    <div class="toolbar-group">
      <div class="dropdown">
        <button id="btn-add-node">➕ Add Node</button>
        <div class="dropdown-menu hidden" id="add-node-menu">
          <div class="dropdown-item" data-action="image">📷 Image</div>
          <div class="dropdown-item" data-action="prompt">✏️ Prompt</div>
          <div class="dropdown-item" data-action="workflow">⚙️ Workflow</div>
          <div class="dropdown-item" data-action="generate">▶ Generate</div>
        </div>
      </div>
      <button id="btn-save" title="Save Canvas">💾 Save</button>
      <button id="btn-load" title="Load Canvas">📂 Load</button>
      <button id="btn-settings" title="Settings">⚙️</button>
    </div>
    <div class="toolbar-group status">
      <span id="comfy-status" class="status-dot disconnected" title="ComfyUI status">●</span>
      <span id="zoom-level">100%</span>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <!-- Properties panel -->
  <div id="properties" class="hidden">
    <div id="properties-header">
      <h3>Properties</h3>
      <button id="properties-close">✕</button>
    </div>
    <div id="properties-body"></div>
  </div>

  <!-- Quick add popup -->
  <div id="quick-add" class="hidden">
    <input type="text" id="quick-add-search" placeholder="Search nodes..." autocomplete="off">
    <div id="quick-add-list">
      <div class="quick-add-item" data-action="image">📷 Image</div>
      <div class="quick-add-item" data-action="prompt">✏️ Prompt</div>
      <div class="quick-add-item" data-action="workflow">⚙️ Workflow</div>
      <div class="quick-add-item" data-action="generate">▶ Generate</div>
    </div>
  </div>

  <!-- Context menu -->
  <div id="context-menu" class="hidden">
    <div class="ctx-item" data-action="delete">🗑 Delete Node</div>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Settings</h3>
      <div class="prop-section">
        <label class="prop-section-label">ComfyUI URL</label>
        <input type="text" id="settings-comfy-url" class="prop-input" placeholder="http://localhost:8188">
      </div>
      <div class="prop-section">
        <label class="prop-section-label">Output Directory</label>
        <input type="text" id="settings-output-dir" class="prop-input" placeholder="e.g. C:\Users\me\outputs or /home/me/outputs">
        <p style="font-size:11px;color:#666;margin-top:4px">Where ComfyUI saves generated images. Leave blank for ComfyUI default.</p>
      </div>
      <div class="modal-actions">
        <button id="settings-save" class="generate-btn">Save</button>
        <button id="settings-cancel" class="prop-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Workflow template picker modal -->
  <div id="workflow-picker" class="modal hidden">
    <div class="modal-content">
      <h3>Choose Workflow</h3>
      <div id="workflow-picker-list"></div>
      <button id="workflow-picker-cancel" class="prop-btn" style="margin-top:12px;width:100%">Cancel</button>
    </div>
  </div>

  <script src="canvas-engine.js?v=6"></script>
  <script src="image-node.js?v=6"></script>
  <script src="prompt-node.js?v=6"></script>
  <script src="workflow-node.js?v=6"></script>
  <script src="generate-node.js?v=6"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
